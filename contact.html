<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Kilmaru — Brand Partnerships and Inquiries</title>
    <meta name="description" content="Contact Kilmaru for brand partnerships, sponsored content, and press inquiries. Use the form below or email sagalabs@proton.me.">
    <meta name="keywords" content="contact kilmaru, kilmaru email, kilmaru brand partnership, kilmaru inquiries">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://kilmaru.com/contact.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kilmaru.com/contact.html">
    <meta property="og:title" content="Contact Kilmaru">
    <meta property="og:description" content="Reach Kilmaru for brand partnerships and press inquiries.">
    <meta property="og:image" content="https://kilmaru.com/images/profile.jpg">
    <meta property="og:locale" content="en_US">

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://kilmaru.com/contact.html">
    <meta property="twitter:title" content="Contact Kilmaru">
    <meta property="twitter:description" content="Reach Kilmaru for brand partnerships and press inquiries.">
    <meta property="twitter:image" content="https://kilmaru.com/images/profile.jpg">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <link rel="shortcut icon" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=3.0">
    <style>
        .contact-form {
            max-width: 480px;
            width: 100%;
            margin: 1rem auto 0;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
        }
        .contact-tagline {
            font-family: var(--display);
            font-style: italic;
            text-align: center;
            color: var(--ink-mute);
            font-size: 1rem;
            max-width: 420px;
            margin: 0 auto;
        }
        .contact-direct {
            text-align: center;
            font-size: 0.85rem;
            color: var(--ink-mute);
            margin-top: 0.5rem;
        }
        .contact-direct a {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
    </style>
</head>

<body>
    <a href="./" class="fixed-back-button">← Back</a>
    <div class="main-container">
        <div class="page-header" style="margin-bottom: 1rem;">
            <span class="page-label">Correspondence</span>
            <h1 class="page-title">Let's <em>talk.</em></h1>
            <p class="page-subtitle">For brand partnerships and press.</p>
        </div>

        <p class="contact-tagline">Send a brief below or email <a href="mailto:sagalabs@proton.me" style="color: var(--ink); text-decoration: underline; text-underline-offset: 3px;">sagalabs@proton.me</a>.</p>

        <form id="contact-form" class="contact-form">
            <input type="hidden" name="redirect" value="https://kilmaru.com/">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
            <div id="form-message" class="form-message"></div>
        </form>

        <div class="social-links">
            <a href="https://instagram.com/kilmaruig" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
            </a>
            <a href="https://tiktok.com/@kilmaru" target="_blank" aria-label="TikTok">
                <svg viewBox="0 0 24 24">
                    <path d="M9 12a4 4 0 1 0 4 4v-12a5 5 0 0 0 5 5"></path>
                </svg>
            </a>
            <a href="https://youtube.com/@kilmaruyt" target="_blank" aria-label="YouTube">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z">
                    </path>
                    <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
                </svg>
            </a>
            <a href="contact.html" aria-label="Contact">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </a>
        </div>
    </div>

    <script>
        const contactForm = document.getElementById('contact-form');
        const submitBtn = contactForm.querySelector('button[type="submit"]');

        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(contactForm);
            formData.append("access_key", "ccf14269-30c1-4db4-a7f4-c10b52a942b0");

            const originalText = submitBtn.textContent;

            submitBtn.textContent = "Sending...";
            submitBtn.disabled = true;

            try {
                const response = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage("Success! Your message has been sent.", "success");
                    contactForm.reset();
                } else {
                    showMessage("Error: " + data.message, "error");
                }

            } catch (error) {
                showMessage("Something went wrong. Please try again.", "error");
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        function showMessage(text, type) {
            const messageEl = document.getElementById('form-message');
            messageEl.textContent = text;
            messageEl.className = 'form-message ' + type;
            messageEl.style.display = 'block';

            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }
    </script>

</body>

</html>
